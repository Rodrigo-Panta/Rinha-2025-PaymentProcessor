services:
  api:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - ./.env
    hostname: payment-processor-api-1
    networks:
      - backend
      - payment-processor
    deploy:
      resources:
        limits:
          cpus: "0.55"
          memory: "30MB"

networks:
  backend:
    driver: bridge
  payment-processor:
    external: true