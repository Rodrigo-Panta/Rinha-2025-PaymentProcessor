services:
  nginx:
    image: nginx:1.25-alpine
    container_name: rinha-nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api1
      - api2
    ports:
      - "9999:9999"
    networks:
      - backend
      - payment-processor
    deploy:
      resources:
        limits:
          cpus: "0.15"
          memory: "15MB"
    hostname: rinha-nginx
  api1:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - ./.env
    hostname: api1
    networks:
      - backend
      - payment-processor
    deploy:
      resources:
        limits:
          cpus: "0.55"
          memory: "30MB"
  api2:
    build: .
    ports:
      - "8081:8080"
    env_file:
      - ./.env
    hostname: api2
    networks:
      - backend
      - payment-processor
    deploy:
      resources:
        limits:
          cpus: "0.55"
          memory: "30MB"


networks:
  backend:
    name: backend
    driver: bridge
  payment-processor:
    external: true